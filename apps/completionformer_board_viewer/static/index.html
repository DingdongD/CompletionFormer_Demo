<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RHB Depth Board Viewer</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <link rel="stylesheet" href="/static/style.css?v=responsive-media-20260715">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="mark"></div>
      <div>
        <h1>Depth Board Viewer</h1>
        <p>RHB output and point cloud viewer</p>
      </div>
    </div>

    <section class="panel">
      <label for="modelSelect">Model</label>
      <select id="modelSelect"></select>
      <div id="modelStatus" class="status"></div>
    </section>

    <section class="panel">
      <label for="sampleSelect">NYU sample</label>
      <select id="sampleSelect"></select>
      <div class="buttonRow">
        <button id="loadBtn">Load</button>
        <button id="runBtn" class="primary">Run Board</button>
      </div>
    </section>

    <section class="panel">
      <label>RGBD input</label>
      <input id="rgbInput" type="file" accept="image/*">
      <input id="depthInput" type="file" accept=".npy,.npz,image/*">
      <button id="uploadBtn">Stage RGBD</button>
      <div id="uploadStatus" class="status"></div>
    </section>

    <section class="panel">
      <label>ToF source</label>
      <button id="tofBtn">Check ToF</button>
      <div id="tofStatus" class="status"></div>
    </section>

    <section class="panel metrics">
      <label>Metrics</label>
      <dl id="metrics"></dl>
    </section>
  </aside>

  <main>
    <header class="topbar">
      <div>
        <h2>Board Depth Prediction</h2>
        <p id="pathLine">No sample loaded</p>
      </div>
      <div id="runStatus" class="runStatus">Idle</div>
    </header>

    <section class="latencySection">
      <div class="sectionTitle">
        <h2>Latency Breakdown</h2>
        <span id="latencyTotal"></span>
      </div>
      <div class="latencyBody">
        <div id="latencyPie" class="latencyPie"></div>
        <div id="latencyTable" class="latencyTable"></div>
      </div>
      <p id="latencyInsight" class="latencyInsight"></p>
    </section>

    <section class="imageGrid">
      <figure><img id="rgbImg"><figcaption>rgb</figcaption></figure>
      <figure><img id="sparseImg"><figcaption>sparse depth</figcaption></figure>
      <figure><img id="gtImg"><figcaption>gt</figcaption></figure>
      <figure><img id="refImg"><figcaption>ref pred</figcaption></figure>
      <figure><img id="boardImg"><figcaption>board pred</figcaption></figure>
      <figure><img id="errImg"><figcaption>abs error</figcaption></figure>
    </section>

    <section class="pointSection">
      <div class="sectionTitle">
        <h2>Point Cloud</h2>
        <div class="pointControls">
          <button id="rgbViewBtn" type="button">RGB View</button>
          <button id="obliqueViewBtn" type="button">Oblique</button>
          <button id="topViewBtn" type="button">Top</button>
          <button id="bevViewBtn" type="button">BEV</button>
          <span id="pointCount"></span>
        </div>
      </div>
      <div id="pointCloud"></div>
    </section>

    <section class="logSection">
      <div class="sectionTitle">
        <h2>Board Log</h2>
        <span id="logState">last run</span>
      </div>
      <pre id="boardLog"></pre>
    </section>
  </main>

  <script src="/static/app.js?v=responsive-media-20260715"></script>
</body>
</html>
